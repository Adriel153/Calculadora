<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Projeto Calculadora</title>
</head>

<body>
    <h1>Minha Calculadora</h1>
    <h3>programador: Adriel Félix</h3>
    <section>
        <h2>Calculadora</h2>
        <p id="resultado"></p>
        <table>
            <tr>
                <td><button onclick="insert('AC')" class="caracteres">AC</button></td>
                <td><button onclick="insert('(')" class="caracteres">(</button></td>
                <td><button onclick="insert(')')" class="caracteres">)</button></td>
                <td><button onclick="insert('÷')" id="dividir" class="caracteres">÷</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('7')" class="caracteres">7</button></td>
                <td><button onclick="insert('8')" class="caracteres">8</button></td>
                <td><button onclick="insert('9')" class="caracteres">9</button></td>
                <td><button onclick="insert('X')" class="caracteres">X</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('4')" class="caracteres">4</button></td>
                <td><button onclick="insert('5')" class="caracteres">5</button></td>
                <td><button onclick="insert('6')" class="caracteres">6</button></td>
                <td><button onclick="insert('-')" id="menos" class="caracteres">-</button></td>
            </tr>
            <tr>
            <td><button onclick="insert('1')" class="caracteres">1</button></td>
            <td><button onclick="insert('2')" class="caracteres">2</button></td>
            <td><button onclick="insert('3')" class="caracteres">3</button></td>
            <td><button onclick="insert('+')" id="mais" class="caracteres">+</button></td>
        </tr>
        <tr>
            <td><button onclick="insert('0')" class="caracteres">0</button></td>
            <td><button onclick="insert('.')" id="ponto" class="caracteres">.</button></td>
            <td><button onclick="backspace()" class="apagar">⌫</button></td>
            <td><button onclick="calculate()" class="divisao">=</button></td>
        </tr>
        </table>
    </section>
    <script src="script.js"></script>
</body>

</html>
